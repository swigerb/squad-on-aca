version: 1
tools:
  - name: git
    check: git --version
    required: true
  - name: some-tool-that-does-not-exist-xyz
    check: some-tool-that-does-not-exist-xyz --version
    required: false
    reason: Optional helper, only needed for a niche build step
credentials:
  - name: SQUAD_TEST_FIXTURE_TOKEN
    required: false

name: Deploy Squad on ACA

on:
  workflow_dispatch:
    inputs:
      resourceGroup:
        description: Azure resource group
        required: false
        default: rg-squad-aca-dev-eastus2
      location:
        description: Azure region
        required: false
        default: eastus2

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy ACA stack
        shell: pwsh
        run: |
          .\scripts\deploy.ps1 `
            -SubscriptionId "${{ secrets.AZURE_SUBSCRIPTION_ID }}" `
            -ResourceGroupName "${{ inputs.resourceGroup }}" `
            -Location "${{ inputs.location }}" `
            -GitHubToken "${{ secrets.SQUAD_GITHUB_TOKEN }}" `
            -CopilotGitHubToken "${{ secrets.SQUAD_COPILOT_GITHUB_TOKEN }}" `
            -DefaultRepository "${{ github.repository }}"
